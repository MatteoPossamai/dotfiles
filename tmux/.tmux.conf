# ~/.tmux.conf — managed in ~/dotfiles (stow). Plugin-free; works on bare servers.

# --- general ---
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"     # truecolor passthrough
set -g  focus-events on                         # nvim autoread / cursor shape
set -sg escape-time 10                          # snappy ESC inside nvim
set -g  history-limit 50000
set -g  mouse on
set -g  base-index 1                            # windows start at 1
setw -g pane-base-index 1
set -g  renumber-windows on                     # no gaps when a window closes
set -g  set-clipboard on                        # OSC52 clipboard (works over SSH)
set -g  display-time 2000

# --- reload config ---
unbind r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# --- splits: keep default " and % (muscle memory), add | and - too ---
# all keep the current folder
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind |   split-window -h -c "#{pane_current_path}"
bind -   split-window -v -c "#{pane_current_path}"
bind c   new-window      -c "#{pane_current_path}"

# --- vim-style pane navigation (prefix h/j/k/l) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# resize (repeatable: hold to keep resizing)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- mouse wheel behaviour ---
# 1) app grabbed the mouse (htop, vim w/ mouse)      -> forward wheel
# 2) full-screen / alternate-screen app (less, man)  -> send arrow keys (scrolls the app)
# 3) plain shell                                      -> enter tmux scrollback
bind -n WheelUpPane   if -F "#{mouse_any_flag}" "send -M" "if -F '#{alternate_on}' 'send -N1 Up'   'copy-mode -e'"
bind -n WheelDownPane if -F "#{mouse_any_flag}" "send -M" "if -F '#{alternate_on}' 'send -N1 Down' 'send -M'"

# scrollback scroll speed (lines per wheel tick)
bind -T copy-mode-vi WheelUpPane   send -X -N1 scroll-up
bind -T copy-mode-vi WheelDownPane send -X -N1 scroll-down

# --- copy mode: vi keys + system clipboard ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# --- status bar (lightweight, Catppuccin-Mocha palette; no plugins) ---
set -g status-position bottom
set -g status-justify  left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# session name in an accent block on the left
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e] "
set -g status-left-length 30

# clock + date on the right (subtle)
set -g status-right "#[fg=#89b4fa]%H:%M #[fg=#6c7086]%d %b "

# window tabs: dim normal, accent block for current
set -g window-status-format         "#[fg=#6c7086] #I #W "
set -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I #W "

# pane borders: dim, accent for active
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# subtle message styling
set -g message-style "bg=#313244,fg=#cdd6f4"
